<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Profile</title>
  <style>
    body {
      background: #07080a;
      color: white;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    button {
      padding: 12px 24px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover { background: #2563eb; }
  </style>
</head>
<body>

  <h1>Welcome to my site</h1>
  <button onclick="sendView()">Enter Site</button>

  <script>
    // Paste your Discord Webhook URL below
    const WEBHOOK_URL = "https://discord.com/api/webhooks/1525727802056376343/q7rX9Y2uMspNLQDLCO4Pn8saYABmLb5Vu7tHf4gVdMv8uEmaFbvTskI2qRkbdP9z2N6q";

    function sendView() {
      fetch(WEBHOOK_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          embeds: [{
            title: "👁️ New Site Visit",
            description: "**+1 view added!** Someone entered the site.",
            color: 0x3b82f6,
            timestamp: new Date().toISOString()
          }]
        })
      })
      .then(() => alert("Notification sent!"))
      .catch((err) => console.error("Error:", err));
    }
  </script>
</body>
</html>
